<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Perspective Grid — Floating Flip Cards</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* Prevent iframe default body margin/overflow issues */
    body { padding: 0; margin: 0; overflow: hidden; }
  </style>
  <script>
    // Configure Tailwind to include our custom 3D transform utilities
    tailwind.config = {
      theme: { extend: {} },
      plugins: [
        function({ addUtilities }) {
          const rotateXUtilities = {};
          const rotateYUtilities = {};
          const rotateZUtilities = {};
          const rotateValues = [0, 5, 10, 15, 20, 30, 45, 75];
          
          rotateValues.forEach((value) => {
            rotateXUtilities[`.rotate-x-${value}`] = {
              '--tw-rotate-x': `${value}deg`,
              transform: `translate3d(var(--tw-translate-x, 0), var(--tw-translate-y, 0), var(--tw-translate-z, 0)) rotateX(var(--tw-rotate-x, 0)) rotateY(var(--tw-rotate-y, 0)) rotateZ(var(--tw-rotate-z, 0)) skewX(var(--tw-skew-x, 0)) skewY(var(--tw-skew-y, 0)) scaleX(var(--tw-scale-x, 1)) scaleY(var(--tw-scale-y, 1))`
            };
            if (value !== 0) {
              rotateXUtilities[`.-rotate-x-${value}`] = {
                '--tw-rotate-x': `-${value}deg`,
                transform: `translate3d(var(--tw-translate-x, 0), var(--tw-translate-y, 0), var(--tw-translate-z, 0)) rotateX(var(--tw-rotate-x, 0)) rotateY(var(--tw-rotate-y, 0)) rotateZ(var(--tw-rotate-z, 0)) skewX(var(--tw-skew-x, 0)) skewY(var(--tw-skew-y, 0)) scaleX(var(--tw-scale-x, 1)) scaleY(var(--tw-scale-y, 1))`
              };
            }
          });
          
          rotateValues.forEach((value) => {
            rotateYUtilities[`.rotate-y-${value}`] = {
              '--tw-rotate-y': `${value}deg`,
              transform: `translate3d(var(--tw-translate-x, 0), var(--tw-translate-y, 0), var(--tw-translate-z, 0)) rotateX(var(--tw-rotate-x, 0)) rotateY(var(--tw-rotate-y, 0)) rotateZ(var(--tw-rotate-z, 0)) skewX(var(--tw-skew-x, 0)) skewY(var(--tw-skew-y, 0)) scaleX(var(--tw-scale-x, 1)) scaleY(var(--tw-scale-y, 1))`
            };
            if (value !== 0) {
              rotateYUtilities[`.-rotate-y-${value}`] = {
                '--tw-rotate-y': `-${value}deg`,
                transform: `translate3d(var(--tw-translate-x, 0), var(--tw-translate-y, 0), var(--tw-translate-z, 0)) rotateX(var(--tw-rotate-x, 0)) rotateY(var(--tw-rotate-y, 0)) rotateZ(var(--tw-rotate-z, 0)) skewX(var(--tw-skew-x, 0)) skewY(var(--tw-skew-y, 0)) scaleX(var(--tw-scale-x, 1)) scaleY(var(--tw-scale-y, 1))`
              };
            }
          });
          
          rotateValues.forEach((value) => {
            rotateZUtilities[`.rotate-z-${value}`] = {
              '--tw-rotate-z': `${value}deg`,
              transform: `translate3d(var(--tw-translate-x, 0), var(--tw-translate-y, 0), var(--tw-translate-z, 0)) rotateX(var(--tw-rotate-x, 0)) rotateY(var(--tw-rotate-y, 0)) rotateZ(var(--tw-rotate-z, 0)) skewX(var(--tw-skew-x, 0)) skewY(var(--tw-skew-y, 0)) scaleX(var(--tw-scale-x, 1)) scaleY(var(--tw-scale-y, 1))`
            };
            if (value !== 0) {
              rotateZUtilities[`.-rotate-z-${value}`] = {
                '--tw-rotate-z': `-${value}deg`,
                transform: `translate3d(var(--tw-translate-x, 0), var(--tw-translate-y, 0), var(--tw-translate-z, 0)) rotateX(var(--tw-rotate-x, 0)) rotateY(var(--tw-rotate-y, 0)) rotateZ(var(--tw-rotate-z, 0)) skewX(var(--tw-skew-x, 0)) skewY(var(--tw-skew-y, 0)) scaleX(var(--tw-scale-x, 1)) scaleY(var(--tw-scale-y, 1))`
              };
            }
          });

          const perspectiveUtilities = {
            ".perspective-none": { perspective: "none" },
            ".perspective-dramatic": { perspective: "100px" },
            ".perspective-near": { perspective: "300px" },
            ".perspective-normal": { perspective: "500px" },
            ".perspective-midrange": { perspective: "800px" },
            ".perspective-distant": { perspective: "1200px" },
          };

          const transformStyleUtilities = {
            ".transform-style-preserve-3d": { "transform-style": "preserve-3d" },
            ".transform-style-flat": { "transform-style": "flat" },
          };

          addUtilities({
            ...rotateXUtilities,
            ...rotateYUtilities,
            ...rotateZUtilities,
            ...perspectiveUtilities,
            ...transformStyleUtilities,
          });
        }
      ]
    };
  </script>
</head>
<body class="bg-[#080808] text-white antialiased selection:bg-white/10 selection:text-white" style="font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, 'Apple Color Emoji', 'Segoe UI Emoji';">
  <!-- Header Removed so it blends beautifully without double headers -->

  <!-- Scene -->
  <main class="relative h-screen w-full overflow-hidden">
    <!-- background glow / subtle grid -->
    <div class="absolute inset-0 -z-10">
      <div class="absolute inset-0" style="background: radial-gradient(1200px 600px at 50% 20%, rgba(80,80,255,0.08), transparent 60%), radial-gradient(900px 500px at 10% 80%, rgba(0,255,200,0.06), transparent 60%);"></div>
      <div class="absolute inset-x-0 top-0 h-px bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
      <div class="absolute inset-x-0 bottom-0 h-px bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
    </div>

    <!-- viewport with perspective -->
    <div id="viewport" class="relative h-full w-full" style="perspective: 1200px; perspective-origin: 50% 45%; touch-action: none;">
      <!-- world (camera inverse) -->
      <div id="world" class="absolute inset-0 will-change-transform" style="transform-style: preserve-3d; transform: translate3d(0px,0px,800px) rotateX(0deg) rotateY(0deg);">
        <!-- Cards will be injected here -->
      </div>
    </div>

    <!-- Side navigation: previous / next focus -->
    <div class="pointer-events-none absolute inset-y-0 left-0 right-0 z-[30] flex items-center justify-between px-4 sm:px-6">
      <button id="prevBtn" class="pointer-events-auto inline-flex items-center justify-center h-11 w-11 rounded-full border border-white/10 bg-white/5 hover:bg-white/10 transition-colors focus:outline-none focus:ring-2 focus:ring-white/20" aria-label="Previous">
        <!-- lucide:chevron-left -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;">
          <path d="m15 18-6-6 6-6"/>
        </svg>
      </button>
      <button id="nextBtn" class="pointer-events-auto inline-flex items-center justify-center h-11 w-11 rounded-full border border-white/10 bg-white/5 hover:bg-white/10 transition-colors focus:outline-none focus:ring-2 focus:ring-white/20" aria-label="Next">
        <!-- lucide:chevron-right -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;">
          <path d="m9 18 6-6-6-6"/>
        </svg>
      </button>
    </div>

    <!-- Bottom controls -->
    <div class="pointer-events-none absolute bottom-4 left-0 right-0 z-[30] flex items-center justify-center">
      <div class="pointer-events-auto flex items-center gap-3 rounded-xl border border-white/10 bg-white/5 px-3.5 py-2.5 shadow-[0_10px_40px_-12px_rgba(0,0,0,0.6)] backdrop-blur-sm">
        <div class="flex items-center gap-2">
          <!-- lucide:move -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="text-white/80" style="stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;">
            <path d="M5 9V5h4M15 5h4v4M9 19H5v-4M19 15v4h-4M5 5l14 14"/>
          </svg>
          <span class="text-[12px] font-medium text-white/80">Float through the grid</span>
        </div>
        <span class="mx-2 h-4 w-px bg-white/10"></span>
        <div class="flex items-center gap-1.5 hidden sm:flex">
          <kbd class="rounded-md border border-white/10 bg-white/10 px-1.5 py-0.5 text-[11px] font-medium">W</kbd>
          <kbd class="rounded-md border border-white/10 bg-white/10 px-1.5 py-0.5 text-[11px] font-medium">A</kbd>
          <kbd class="rounded-md border border-white/10 bg-white/10 px-1.5 py-0.5 text-[11px] font-medium">S</kbd>
          <kbd class="rounded-md border border-white/10 bg-white/10 px-1.5 py-0.5 text-[11px] font-medium">D</kbd>
          <span class="text-[11px] text-white/50 ml-1">or arrows</span>
          <span class="mx-2 h-4 w-px bg-white/10"></span>
        </div>
        <div class="flex items-center gap-2">
          <!-- lucide:mouse -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="text-white/80" style="stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;">
            <rect x="6" y="2" width="12" height="20" rx="6"/>
            <path d="M12 6v4"/>
          </svg>
          <span class="text-[12px] font-medium text-white/80">Click a card to reveal</span>
        </div>
      </div>
    </div>
  </main>

  <!-- Modal logic -->
  <div id="flipModal" class="fixed inset-0 z-[50] hidden">
    <div id="modalBackdrop" class="absolute inset-0 bg-black/80 opacity-0 transition-opacity duration-300"></div>
    <div class="absolute inset-0 flex items-center justify-center">
      <div class="relative" style="width: min(86vw, 1100px); height: min(82vh, 760px); perspective: 1200px;">
        <div id="flipInner" class="relative h-full w-full" style="transform-style: preserve-3d; transform: rotateY(0deg); transition: transform 800ms cubic-bezier(0.2, 0.8, 0.16, 1);">
          <!-- front -->
          <div class="absolute inset-0 rounded-2xl overflow-hidden ring-1 ring-white/10 bg-gradient-to-br from-neutral-900 to-neutral-800 flex items-center justify-center" style="backface-visibility: hidden;">
            <div class="flex flex-col items-center justify-center gap-4">
              <div class="h-12 w-12 rounded-full bg-white/5 flex items-center justify-center ring-1 ring-white/10">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" class="text-white/80" style="stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;">
                  <rect x="3" y="3" width="18" height="18" rx="2"/>
                  <circle cx="9" cy="9" r="2"/>
                  <path d="m21 15-3.86-3.86a2 2 0 0 0-2.83 0L7 18"/>
                </svg>
              </div>
              <p class="text-sm text-white/70">Click flips to reveal the full image</p>
            </div>
          </div>
          <!-- back -->
          <div class="absolute inset-0 bg-black rounded-2xl overflow-hidden" style="transform: rotateY(180deg); backface-visibility: hidden;">
            <img id="modalImage" alt="Full size" class="absolute inset-0 h-full w-full object-cover" />
            <div class="absolute inset-x-0 top-0 flex items-center justify-between p-3">
              <div class="rounded-lg bg-black/30 backdrop-blur-md px-2.5 py-1.5 text-xs text-white/70 ring-1 ring-white/10">Fullscreen flip</div>
              <button id="closeModalBtn" class="inline-flex items-center gap-2 rounded-full bg-black/40 px-3 py-1.5 text-[12px] font-medium ring-1 ring-white/10 hover:bg-black/60 transition-colors">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;"><path d="M18 6 6 18M6 6l12 12"/></svg>
                Close
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script>
    // Using some real images from the app instead of placeholder Unsplash
    const imageURLs = [
      "/mediakits/_MG_0048 2.jpg",
      "/mediakits/2025-08-19-at-01.29.jpg",
      "/covers/cover1.jpg",
      "/media/photos/vixen_fien.jpg",
      "/media/photos/sydney_swagg.jpg",
      "/media/photos/lion_paballo.jpg",
      "/media/photos/barbiie_stallion.jpg",
      "/media/photos/caramel_latte.jpg",
      "/media/photos/gorg_fox.rsa.jpg",
      "/media/photos/momobabes21.jpg",
      "/mediakits/9.jpg",
      "/mediakits/_MG_0048.jpg"
    ];

    const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
    const lerp = (a, b, t) => a + (b - a) * t;

    const camera = { x: 0, y: 0, z: 800, yaw: 0, pitch: -6 };
    const target = { x: 0, y: 0, z: 800, yaw: 0, pitch: -6 };
    const velocity = { x: 0, y: 0, z: 0 };
    const keys = {};
    let dragging = false;
    let lastMouse = { x: 0, y: 0 };

    const viewport = document.getElementById('viewport');
    const world = document.getElementById('world');
    const cards = [];
    const COLS = 5;
    const ROWS = 4;
    const spacingX = 440;
    const spacingY = 300;
    const spacingZ = 620;
    const baseDepth = -900;

    function createCard(imgSrc, idx, col, row, depthLayer) {
      const card = document.createElement('div');
      card.className = "group absolute rounded-xl overflow-hidden bg-neutral-900/40 backdrop-blur-sm ring-1 ring-white/10 shadow-[0_20px_60px_-12px_rgba(0,0,0,0.8)]";
      const w = Math.min(280, Math.max(220, Math.floor(window.innerWidth * 0.22)));
      const h = Math.floor(w * 1.4);

      const jitterX = (Math.random() - 0.5) * 140;
      const jitterY = (Math.random() - 0.5) * 120;
      const jitterZ = (Math.random() - 0.5) * 90;

      const baseX = (col - (COLS - 1) / 2) * spacingX + jitterX;
      const baseY = (row - (ROWS - 1) / 2) * spacingY + jitterY;
      const baseZ = baseDepth - depthLayer * spacingZ + jitterZ;

      const tiltY = (Math.random() - 0.5) * 14;
      const tiltX = (Math.random() - 0.5) * 8;
      const amp = 10 + Math.random() * 22;
      const spd = 0.6 + Math.random() * 0.9;
      const ph = Math.random() * Math.PI * 2;

      const state = { baseX, baseY, baseZ, tiltX, tiltY, amp, spd, ph, w, h, imgSrc };
      card.style.width = w + "px";
      card.style.height = h + "px";
      card.style.transformStyle = "preserve-3d";

      const inner = document.createElement('div');
      inner.className = "relative h-full w-full";
      const img = document.createElement('img');
      img.src = imgSrc;
      img.alt = "Card image";
      img.className = "absolute inset-0 h-full w-full object-cover";
      inner.appendChild(img);

      const overlay = document.createElement('div');
      overlay.className = "pointer-events-none absolute inset-0";
      overlay.style.background = "linear-gradient(to bottom, rgba(0,0,0,0) 60%, rgba(0,0,0,0.45))";
      inner.appendChild(overlay);

      const footer = document.createElement('div');
      footer.className = "absolute bottom-3 left-3 right-3 flex items-center justify-between";
      const label = document.createElement('div');
      label.className = "inline-flex items-center gap-2 rounded-lg bg-black/40 px-2.5 py-1.5 text-[11px] font-medium ring-1 ring-white/20 backdrop-blur-sm text-white/90";
      label.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;">
          <rect x="3" y="3" width="18" height="18" rx="2"></rect>
          <circle cx="9" cy="9" r="2"></circle>
          <path d="m21 15-3.86-3.86a2 2 0 0 0-2.83 0L7 18"></path>
        </svg>
        Floating
      `;
      const btn = document.createElement('button');
      btn.className = "inline-flex items-center gap-2 rounded-lg bg-white/20 hover:bg-white/30 transition-colors px-2.5 py-1.5 text-[11px] font-medium ring-1 ring-white/20 text-white shadow-lg pointer-events-auto cursor-pointer";
      btn.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;">
          <path d="M15 3h6v6M10 14 21 3M9 7H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-4"/>
        </svg>
        Reveal
      `;
      
      inner.appendChild(footer);

      let hover = 0;
      card.addEventListener('pointerenter', () => { hover = 1; });
      card.addEventListener('pointerleave', () => { hover = 0; });

      card.addEventListener('click', () => openModal(imgSrc));

      card.appendChild(inner);
      world.appendChild(card);

      function render(t) {
        const floatY = Math.sin(t * state.spd + state.ph) * state.amp;
        const floatX = Math.cos(t * (state.spd * 0.8) + state.ph) * (state.amp * 0.25);
        const lift = hover ? 12 : 0;
        const rx = state.tiltX + (hover ? -4 : 0);
        const ry = state.tiltY + (hover ? 4 : 0);
        card.style.transform = `translate3d(${state.baseX + floatX}px, ${state.baseY + floatY - lift}px, ${state.baseZ}px) rotateX(${rx}deg) rotateY(${ry}deg)`;
        if(hover) { card.style.zIndex = 100; } else { card.style.zIndex = 1; }
      }

      cards.push({ el: card, state, render, idx });
      return card;
    }

    (function build() {
      let idx = 0;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const src = imageURLs[idx % imageURLs.length];
          createCard(src, idx, c, r, r + Math.floor(c * 0.6));
          idx++;
        }
      }
    })();

    let focusIndex = 0;
    function flyToCard(index) {
      if (cards.length === 0) return;
      focusIndex = (index + cards.length) % cards.length;
      const { state } = cards[focusIndex];
      const margin = 720; 
      target.x = state.baseX;
      target.y = state.baseY;
      target.z = state.baseZ + margin;
    }
    document.getElementById('prevBtn').addEventListener('click', () => flyToCard(focusIndex - 1));
    document.getElementById('nextBtn').addEventListener('click', () => flyToCard(focusIndex + 1));

    window.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
      if (e.key === ' ') flyToCard(focusIndex + 1);
    });
    window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

    viewport.addEventListener('pointerdown', (e) => {
      dragging = true;
      lastMouse.x = e.clientX;
      lastMouse.y = e.clientY;
      viewport.setPointerCapture(e.pointerId);
    });
    viewport.addEventListener('pointerup', (e) => {
      dragging = false;
      viewport.releasePointerCapture(e.pointerId);
    });
    viewport.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const dx = e.clientX - lastMouse.x;
      const dy = e.clientY - lastMouse.y;
      lastMouse.x = e.clientX;
      lastMouse.y = e.clientY;
      target.yaw += dx * -0.06;
      target.pitch += dy * -0.05;
      target.pitch = clamp(target.pitch, -35, 25);
    }, { passive: true });

    window.addEventListener('wheel', (e) => {
      e.stopPropagation();
      const delta = e.deltaY;
      target.z += delta * 0.6;
      target.z = clamp(target.z, -4200, 1800);
    }, { passive: true });

    const modal = document.getElementById('flipModal');
    const modalBackdrop = document.getElementById('modalBackdrop');
    const flipInner = document.getElementById('flipInner');
    const modalImage = document.getElementById('modalImage');
    const closeModalBtn = document.getElementById('closeModalBtn');

    function openModal(src) {
      modalImage.src = src;
      modal.style.display = 'block';
      requestAnimationFrame(() => {
        modalBackdrop.classList.remove('opacity-0');
        modalBackdrop.classList.add('opacity-100');
        flipInner.style.transform = 'rotateY(180deg)';
      });
    }
    function closeModal() {
      modalBackdrop.classList.remove('opacity-100');
      modalBackdrop.classList.add('opacity-0');
      flipInner.style.transform = 'rotateY(0deg)';
      setTimeout(() => {
        modal.style.display = 'none';
      }, 320);
    }
    modal.addEventListener('click', (e) => {
      if (e.target === modal || e.target === modalBackdrop) closeModal();
    });
    closeModalBtn.addEventListener('click', closeModal);
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    let last = performance.now();
    function tick(now) {
      const dt = Math.min(1/30, (now - last) / 1000);
      last = now;

      const speed = (keys['shift'] ? 1200 : 600);
      const acc = { x: 0, y: 0, z: 0 };

      const forward = {
        x: Math.sin((target.yaw) * Math.PI / 180),
        y: 0,
        z: Math.cos((target.yaw) * Math.PI / 180)
      };
      const right = {
        x: Math.cos((target.yaw) * Math.PI / 180),
        y: 0,
        z: -Math.sin((target.yaw) * Math.PI / 180)
      };

      if (keys['w'] || keys['arrowup'])    { acc.x += forward.x; acc.z += forward.z; }
      if (keys['s'] || keys['arrowdown'])  { acc.x -= forward.x; acc.z -= forward.z; }
      if (keys['a'] || keys['arrowleft'])  { acc.x -= right.x;   acc.z -= right.z;   }
      if (keys['d'] || keys['arrowright']) { acc.x += right.x;   acc.z += right.z;   }

      const len = Math.hypot(acc.x, acc.y, acc.z) || 1;
      velocity.x += (acc.x / len) * speed * dt;
      velocity.y += (acc.y / len) * speed * dt;
      velocity.z += (acc.z / len) * speed * dt;

      velocity.x *= 0.86;
      velocity.y *= 0.86;
      velocity.z *= 0.86;

      target.x += velocity.x * dt;
      target.y += velocity.y * dt;
      target.z += velocity.z * dt;
      target.z = clamp(target.z, -5200, 2200);

      camera.x = lerp(camera.x, target.x, 1 - Math.pow(0.06, dt * 60));
      camera.y = lerp(camera.y, target.y, 1 - Math.pow(0.06, dt * 60));
      camera.z = lerp(camera.z, target.z, 1 - Math.pow(0.06, dt * 60));
      camera.yaw = lerp(camera.yaw, target.yaw, 1 - Math.pow(0.12, dt * 60));
      camera.pitch = lerp(camera.pitch, target.pitch, 1 - Math.pow(0.12, dt * 60));

      world.style.transform = `translate3d(${-camera.x}px, ${-camera.y}px, ${-camera.z}px) rotateX(${camera.pitch}deg) rotateY(${camera.yaw}deg)`;

      const t = now / 1000;
      for (const c of cards) c.render(t);

      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    setTimeout(() => flyToCard(8), 60);

    window.addEventListener('resize', () => {
      for (const { el, state } of cards) {
        const w = Math.min(280, Math.max(220, Math.floor(window.innerWidth * 0.22)));
        const h = Math.floor(w * 1.4);
        el.style.width = w + "px";
        el.style.height = h + "px";
        state.w = w; state.h = h;
      }
    });
  </script>
